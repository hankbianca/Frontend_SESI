<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore SESI - Acesso</title>
    <link rel="stylesheet" href="trabaio2.css">
</head>
<body>
    <div class="container">

        <h1>TechStore SESI</h1>

        <section class="formulario">

            <h3>Acesso ao Sistema</h3>

            <label for="inputNome">Nome do cliente</label>
            <input type="text" id="inputNome" placeholder="Digite seu nome" required>

            <label for="inputIdade">Idade</label>
            <input type="number" id="inputIdade" placeholder="Digite sua idade" min="0" required>

            <button onclick="validarAcesso()">
                Entrar no sistema
            </button>

        </section>

        <p id="mensagem"></p>

    </div>

    <script src="começo.js"></script>
</body>
</html>
